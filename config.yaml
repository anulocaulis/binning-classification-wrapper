# Configuration file for Metagenomic Binning and Classification Wrapper

# TEST MODE - Set to True to constrain run to one sample and one assembly type.
# This only affects selection in Snakefile (samples/assembly types), not rule logic.
test_mode: False
test_sample: "S1"
test_assembly_types:
  - megahit
test_comparison_samples:
  - S1

# When true, rule all only targets pooled MetaWRAP cobinning outputs.
metawrap_binning_only_mode: true

# Data directory (absolute path) - organized by sample
data_dir: "/storage/biology/projects/miller-lowry/beitner/data"

# Root directory for assemblies used by pooled binning.
# Recommended canonical layout:
#   <assembly_root_dir>/<assembler>/<sample>.assembly.fasta
# Example:
#   /storage/biology/projects/miller-lowry/beitner/data/assemblies/flye/s1.assembly.fasta
# Backward-compatible legacy layout is still accepted:
#   <assembly_root_dir>/<sample>/<assembly_subdir>/<assembly_name>.fasta
assembly_root_dir: "/storage/biology/projects/miller-lowry/beitner/data/assemblies"

# Sample names organized by read type
# long_read_samples: empty for the current megahit-only test run
long_read_samples: []

# all samples for full run
all_samples:
  - S1
  - S2
  - S3
  - S4
  - S5
  - S6
  - S7
  - S8
  - S9
  - S10
  - S11
  - S12

# Pooled MetaWRAP cobinning controls.
# To keep heavy assemblies from timing out, you can limit contributing samples
# per assembly_subdir and raise runtime minutes for those assemblies.
cobinning_samples_by_assembly:
  assembly.metaspades_hybrid:
    - S1
    - S2
    - S5
  assembly.flye:
    - S1
    - S2
    - S5
  assembly.metamdbg:
    - S1
    - S2
    - S5

# Default pooled cobinning runtime (minutes).
cobinning_runtime_min: 9720

# Per-assembly runtime overrides (minutes).
cobinning_runtime_min_by_assembly:
  assembly.metaspades: 9720
  assembly.metaspades_hybrid: 9720

# Default pooled cobinning thread and memory requests.
cobinning_threads: 16
cobinning_mem_mb: 360000

# Per-assembly thread and memory overrides for heavy assemblies.
cobinning_threads_by_assembly:
  assembly.metaspades: 32
  assembly.metaspades_hybrid: 32

cobinning_mem_mb_by_assembly:
  assembly.metaspades: 500000
  assembly.metaspades_hybrid: 500000

# Output directory for all binning/classification results (relative to working directory)
output_dir: "binning_outputs"

# Number of threads to use (can be overridden per rule)
threads: 16

# Input read files - consistent naming pattern for all samples
# Each sample directory contains: long_reads.bam and short_reads.fastq.gz
input_reads:
  long_bam: "/storage/biology/projects/miller-lowry/beitner/data/{sample}/long_reads.bam"
  short_interleaved: "/storage/biology/projects/miller-lowry/beitner/data/{sample}/short_reads.fastq.gz"
  assembly: "/storage/biology/projects/miller-lowry/beitner/assemblies/{sample}/megahit.final.contigs.fa"

# Path to Kraken2 database (for read classification)
# Prebuilt standard DB unpacked from k2_standard_20240112.tar.gz
kraken2_db: "/storage/biology/projects/miller-lowry/beitner/databases/k2_standard"

# Optional fallback directories checked if kraken2_db is missing required files.
kraken2_db_fallbacks:
  - "/storage/biology/projects/miller-lowry/beitner/databases/kraken2_db"

# Path to GTDB-Tk database (for bin taxonomic classification)
gtdbtk_db: "/storage/biology/projects/miller-lowry/beitner/databases/gtdbtk_db"

# Path to the CheckM2 DIAMOND database file (for MAG quality scoring).
checkm2_db: "/storage/biology/projects/miller-lowry/beitner/databases/CheckM2_database/uniref100.KO.1.dmnd"

# Path to CheckM marker database directory (required by MetaWRAP bin_refinement).
checkm_db: "/storage/biology/projects/miller-lowry/beitner/databases/checkm_data"

# Optional explicit path to MetaWRAP CLI inside the metawrap container.
metawrap_executable: "/usr/local/bin/metawrap"

# MetaWRAP read mode for input_reads.short_interleaved.
metawrap_reads_mode: "--interleaved"

# Cleaned interleaved reads staged for MetaWRAP binning.
clean_data_dir: "/storage/biology/projects/miller-lowry/beitner/data/clean_data"
clean_reads_source: "/storage/biology/projects/miller-lowry/beitner/metagenomic-multi-assembly-wrapper/trimmed_reads/{sample}_interleaved_trimmed_polyG_filtered.fastq.gz"

# ---
# Assembly comparison settings (one target per assembler)
# comparison_samples defaults to long_read_samples when omitted
assembly_types:
  - megahit
  - idbaud
  - metaspades
  - flye
  - metamdbg
  # - metaconnet  # temporarily disabled: missing assemblies
  # - opera_ms  # temporarily disabled: incomplete assemblies
  - metaspades_hybrid

# Optional: limit assembly comparison to specific samples
comparison_samples: []  # temporarily disable assembly_eval/metaquast targets

# Optional: explicit per-assembler assembly paths.
# This is intentionally assembler-specific (no sr/lr aliases).
assembly_inputs:
  megahit: "/storage/biology/projects/miller-lowry/beitner/data/assemblies/megahit/{sample_lower}.assembly.fasta"
  idbaud: "/storage/biology/projects/miller-lowry/beitner/data/assemblies/idbaud/{sample_lower}.assembly.fasta"
  metaspades: "/storage/biology/projects/miller-lowry/beitner/data/assemblies/metaspades/{sample_lower}.assembly.fasta"
  flye: "/storage/biology/projects/miller-lowry/beitner/data/assemblies/flye/{sample_lower}.assembly.fasta"
  metamdbg: "/storage/biology/projects/miller-lowry/beitner/data/assemblies/metamdbg/{sample_lower}.assembly.fasta"
  metaconnet: "/storage/biology/projects/miller-lowry/beitner/data/assemblies/metaconnet/{sample_lower}.assembly.fasta"
  metaspades_hybrid: "/storage/biology/projects/miller-lowry/beitner/data/assemblies/metaspades_hybrid/{sample_lower}.assembly.fasta"

# ONT FASTQ input for Filtlong (required for long-read filtering step)
ont_reads: "/storage/biology/projects/miller-lowry/beitner/data/{sample}/long_reads.fastq.gz"

# Filtlong options
filtlong:
  min_length: 1000
  min_mean_q: 10

# Assembly evaluation options
assembly_eval:
  offline: true
  extra_args: ""

# Nonpareil options for assembly evaluation
nonpareil:
  input_mode: "reads"
  algorithm: "kmer"
  format: "fastq"
  extra_args: ""

# Curated MAG FASTAs to aggregate into a single reference for future MetaQUAST runs
# Leave empty for now; this path is not called by rule all.
best_mag_reference_inputs: []

# GUNC database (optional, but recommended)
gunc_db: "/storage/biology/projects/miller-lowry/beitner/databases/gunc_db/gunc_db_progenomes2.1.dmnd"

# MAGqual (optional): native MIMAG labeling with Bakta + CheckM inside magqual.sif
magqual:
  # Optional but recommended: set to a shared Bakta DB (v5+) directory to avoid per-run downloads.
  # Leave empty to let MAGqual download/use its own Bakta light DB inside the MAGqual output directory.
  bakta_db: "/storage/biology/projects/miller-lowry/beitner/databases/bakta_db"
  # Optional CheckM database directory for MAGqual's internal CheckM step.
  checkm_db: ""

# MAGScoT options
magscot:
  enabled: false
  # REQUIRED when enabled: HMM database used by hmmscan to generate marker hits.
  marker_hmm_db: "/storage/biology/projects/miller-lowry/beitner/databases/magscot_markers"
  # hmmscan sequence-level E-value threshold for marker hit generation.
  hmmer_evalue: 1e-10
  # Scoring profile: bac120+ar53, ar53, or bac120
  profile: "bac120+ar53"
  # Output basename written under {output_dir}/{sample}/bin_refinement/magscot/
  out: "MAGScoT"
  bin_separator: "cleanbin"
  score_a: 1
  score_b: 0.5
  score_c: 0.5
  max_cont: 1
  threshold: 0.5
  min_markers: 25
  min_sharing: 0.8
  n_iterations: 2
  score_only: false
  skip_merge_bins: false

# VAMB options
vamb:
  # Use contigs from input_reads.assembly (e.g., megahit.final.contigs.fa)
  # and abundance derived from SR mapping BAM.
  min_contig_len: 2000
  threads: 16
  norefcheck: false

# Multi-split (sample-wise assembly, multi-sample coverage) pooled binning.
comingled_binning:
  enabled: true
  assembly_types:
    - sr
  # MetaWRAP pooled metabat2/concoct minimum contig length.
  min_contig_len: 1000
  # VAMB pooled settings.
  vamb_min_contig_len: 2000
  vamb_threads: 16
  vamb_norefcheck: false

# BUSCO options
busco:
  lineage: "bacteria_odb10"
  mode: "genome"

# Prokka options
prokka:
  kingdom: "Bacteria"

# MultiQC options
multiqc:
  title: "Binning Classification Workflow"
  comment: "Consolidated QC and analysis summary"
  # Optional extra CLI args passed to multiqc (example: "--ignore \"*tmp*\" --quiet")
  extra_args: ""

# Binning assembly subdirectories to loop over (all assemblers available)
binning_assembly_subdirs:
  - assembly.flye
  - assembly.megahit
  - assembly.idbaud
  - assembly.metaspades
  # - assembly.metaconnet  # temporarily disabled: incomplete cobinning outputs
  # - assembly.opera_ms  # temporarily disabled: incomplete assemblies
  - assembly.metamdbg
  - assembly.metaspades_hybrid

# Primary assembly subdir for canonical outputs (metabat2_bins, metawrap_50_10_bins, etc.)
primary_binning_subdir: assembly.megahit
