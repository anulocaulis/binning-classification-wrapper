# Configuration file for Metagenomic Binning and Classification Wrapper

# TEST MODE - Set to True to constrain run to one sample and one assembly type.
# This only affects selection in Snakefile (samples/assembly types), not rule logic.
test_mode: True
test_sample: "S1"
test_assembly_types:
  - sr
test_comparison_samples:
  - S1

# Data directory (absolute path) - organized by sample
data_dir: "/storage/biology/projects/miller-lowry/beitner/data"

# Sample names organized by read type
# long_read_samples: empty for the current megahit-only test run
long_read_samples: []

# all samples: for test, only S1
all_samples:
  - S1

# Output directory for all binning/classification results (relative to working directory)
output_dir: "binning_outputs"

# Number of threads to use (can be overridden per rule)
threads: 16

# Input read files - consistent naming pattern for all samples
# Each sample directory contains: long_reads.bam and short_reads.fastq.gz
input_reads:
  long_bam: "/storage/biology/projects/miller-lowry/beitner/data/{sample}/long_reads.bam"
  short_interleaved: "/storage/biology/projects/miller-lowry/beitner/data/{sample}/short_reads.fastq.gz"
  assembly: "/storage/biology/projects/miller-lowry/beitner/assemblies/{sample}/megahit.final.contigs.fa"

# Path to Kraken2 database (for read classification)
# Prebuilt standard DB unpacked from k2_standard_20240112.tar.gz
kraken2_db: "/storage/biology/projects/miller-lowry/beitner/databases/k2_standard"

# Optional fallback directories checked if kraken2_db is missing required files.
kraken2_db_fallbacks:
  - "/storage/biology/projects/miller-lowry/beitner/databases/kraken2_db"

# Path to GTDB-Tk database (for bin taxonomic classification)
gtdbtk_db: "/storage/biology/projects/miller-lowry/beitner/databases/gtdbtk_db"

# Optional explicit path to MetaWRAP CLI inside the metawrap container.
metawrap_executable: "/usr/local/bin/metawrap"

# MetaWRAP read mode for input_reads.short_interleaved.
metawrap_reads_mode: "--interleaved"

# ---
# Assembly comparison settings (SR/LR/Hybrid)
# comparison_samples defaults to long_read_samples when omitted
assembly_types:
  - sr

# Optional: limit assembly comparison to specific samples
comparison_samples:
  - S1

# Optional: explicit assembly paths for each assembly type
# For test, only use megahit for sr, and fallback for others (will error if not present, as intended for test)
assembly_inputs:
  sr: "/storage/biology/projects/miller-lowry/beitner/assemblies/{sample}/megahit.final.contigs.fa"
  lr: "/storage/biology/projects/miller-lowry/beitner/assemblies/{sample}/flye.assembly.fasta"
  hybrid: "/storage/biology/projects/miller-lowry/beitner/assemblies/{sample}/metaspades_hybrid.contigs.fasta"

# ONT FASTQ input for Filtlong (required for long-read filtering step)
ont_reads: "/storage/biology/projects/miller-lowry/beitner/data/{sample}/long_reads.fastq.gz"

# Filtlong options
filtlong:
  min_length: 1000
  min_mean_q: 10

# Assembly evaluation options
assembly_eval:
  offline: true
  extra_args: ""

# Nonpareil options for assembly evaluation
nonpareil:
  input_mode: "reads"
  algorithm: "kmer"
  format: "fastq"
  extra_args: ""

# Curated MAG FASTAs to aggregate into a single reference for future MetaQUAST runs
# Leave empty for now; this path is not called by rule all.
best_mag_reference_inputs: []

# GUNC database (optional, but recommended)
gunc_db: ""

# BUSCO options
busco:
  lineage: "bacteria_odb10"
  mode: "genome"

# Prokka options
prokka:
  kingdom: "Bacteria"

# MultiQC options
multiqc:
  title: "Binning Classification Workflow"
  comment: "Consolidated QC and analysis summary"
  # Optional extra CLI args passed to multiqc (example: "--ignore \"*tmp*\" --quiet")
  extra_args: ""
